name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Platane/snk's default action queries the full, unbounded
      # contributionsCollection, which GitHub's GraphQL cost estimator now
      # rejects with "Resource limits for this query exceeded" for accounts
      # with enough contribution volume. This runs snk's own CLI unmodified,
      # but preloads a fetch patch (.github/scripts/snake-fetch-patch.mjs)
      # that fetches the same data in date-bounded, adaptively-split chunks.
      - name: Generate contribution snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--import ./.github/scripts/snake-fetch-patch.mjs"
        run: |
          npx --yes generate-snake-animation@3.5.0 \
            --github_user="${{ github.repository_owner }}" \
            --output="dist/github-contribution-grid-snake.svg" \
            --output="dist/github-contribution-grid-snake-dark.svg?palette=github-dark"
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
